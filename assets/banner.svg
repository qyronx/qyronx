<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">

    <defs>
    
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300">
        <stop offset="0%" stop-color="#050505"/>
        <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#00F5A0"/>
        <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    
    <filter id="glow">
        <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40 0H0V40" stroke="#1f2937" stroke-width="1"/>
    </pattern>
    
    </defs>
    
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#grid)" opacity="0.5">
    
        <animateTransform
            attributeName="transform"
            type="translate"
            from="0 0"
            to="40 40"
            dur="12s"
            repeatCount="indefinite"/>
    
    </rect>
    
    <circle cx="170" cy="150" r="90"
    fill="#00F5A0"
    opacity="0.08">
    
    <animate attributeName="r"
    values="85;95;85"
    dur="5s"
    repeatCount="indefinite"/>
    
    </circle>
    
    <circle cx="1030" cy="150" r="120"
    fill="#00D9FF"
    opacity="0.08">
    
    <animate attributeName="r"
    values="115;130;115"
    dur="6s"
    repeatCount="indefinite"/>
    
    </circle>
    
    <text
    x="600"
    y="145"
    text-anchor="middle"
    font-family="Segoe UI, Inter, Arial"
    font-size="78"
    font-weight="800"
    letter-spacing="8"
    fill="url(#textGradient)"
    filter="url(#glow)">
    QYRONX
    </text>
    
    <text
    x="600"
    y="185"
    text-anchor="middle"
    font-family="Segoe UI, Inter, Arial"
    font-size="18"
    letter-spacing="4"
    fill="#9CA3AF">
    FULL STACK • PRIVACY • AI
    </text>
    
    <line x1="350" y1="220" x2="850" y2="220"
    stroke="url(#textGradient)"
    stroke-width="2"
    opacity="0.5">
    
    <animate attributeName="opacity"
    values="0.2;1;0.2"
    dur="3s"
    repeatCount="indefinite"/>
    
    </line>

</svg>
